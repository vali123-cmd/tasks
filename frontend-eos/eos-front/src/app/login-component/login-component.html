<div class="auth-container">
  <div class="auth-card">
    <h2>{{ isLoginMode ? 'Login' : 'Register' }}</h2>

    @if (isLoginMode) {
      
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label for="login-email">Email</label>
          <input id="login-email" type="email" formControlName="email" placeholder="Enter email">
        </div>

        <div class="form-group">
          <label for="login-password">Password</label>
          <input id="login-password" type="password" formControlName="password" placeholder="Enter password">
        </div>

        <button type="submit" [disabled]="loginForm.invalid" class="submit-btn">
          Login
        </button>
      </form>
    } @else {
      
      <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label for="reg-username">Username</label>
          <input id="reg-username" type="text" formControlName="username" placeholder="Choose a username">
        </div>

        <div class="form-group">
          <label for="reg-email">Email</label>
          <input id="reg-email" type="email" formControlName="email" placeholder="Enter your email">
        </div>

        <div class="form-group">
          <label for="reg-birthdate">Birthdate</label>
          <input id="reg-birthdate" type="date" formControlName="birthDate">
        </div>

        <div class="form-group">
          <label for="reg-password">Password</label>
          <input id="reg-password" type="password" formControlName="password" placeholder="Create a password">
        </div>

        <button type="submit" [disabled]="registerForm.invalid" class="submit-btn">
          Register
        </button>
      </form>
    }

    <div class="toggle-container">
      <p>
        {{ isLoginMode ? "Don't have an account?" : "Already have an account?" }}
        <button type="button" class="link-btn" (click)="toggleMode()">
          {{ isLoginMode ? 'Register here' : 'Login here' }}
        </button>
      </p>
    </div>
  </div>
</div>
