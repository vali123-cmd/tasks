<nav>
    
  <ul>
    
    <li><a class = "nav-link" routerLink="/new-task" routerLinkActive="active">New Task</a></li>
    <li><a class = "nav-link" routerLink="/my-tasks" routerLinkActive="active">My Tasks</a></li>
    <li><a class = "nav-link" routerLink="/login" routerLinkActive="active">Login</a></li>
  </ul>
</nav>


@if (isLoggedIn()) {
    <div class="user-info">
    <div class="welcome-message">Welcome, {{ getUser().username }}!</div>
    <button type="button" class="logout-button" (click)="logout()">Logout</button>
    </div>
} @else {
    <a routerLink="/login">Login</a>
}

<router-outlet/>
